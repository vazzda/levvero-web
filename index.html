  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;

    .hero {

    }

    .actions {
      display: flex;
      flex-direction: column;

    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 32px;
    }

    .title {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .title .v1 { color: #FFB703; }
    .title .v2 { color: #219EBC; }

    .tagline {
      font-size: 18px;
      font-weight: 400;
      text-align: center;
      color: #6C757D;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    .stores {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 12px;
      background: #373D43;
      color: #F8F9FA;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn svg {
      width: 22px;
      height: 22px;
      fill: #F8F9FA;
    }

    footer {
      margin-top: auto;
      padding: 24px;
      text-align: center;
    }

    footer a {
      color: #6C757D;
      font-size: 14px;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    .screenshots-wrapper {
      overflow-x: auto;
      scrollbar-width: none;
      width: 100%;
      margin-bottom: 48px;
      cursor: grab;
    }

    .screenshots-wrapper::-webkit-scrollbar {
      display: none;
    }

    .screenshots-wrapper.dragging {
      cursor: grabbing;
      user-select: none;
    }

    .screenshots {
      display: flex;
      gap: 16px;
      width: max-content;
      padding: 0 24px;
    }

    .screenshots .phone-frame {
      flex: 0 0 auto;
      height: min(578px, 93vw);
      aspect-ratio: 9 / 20;
      overflow: hidden;
      border-radius: 12px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .screenshots .phone-frame.tablet {
      aspect-ratio: 417 / 605;
    }

    .screenshots .phone-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
      -webkit-user-drag: none;
    }

    @media (max-width: 767px) {
      .title { font-size: 36px; }
      .tagline { font-size: 16px; }
      .icon { width: 96px; height: 96px; border-radius: 20px; }
    }
  </style>

  <script>
    (function() {
      var w = document.querySelector('.screenshots-wrapper');
      w.scrollLeft = (w.scrollWidth - w.clientWidth) / 2;

      var stopped = false;
      var direction = 1;
      var speed = matchMedia('(pointer: coarse) and (max-width: 767px)').matches ? 0.2 : 0.1;
      var rafId;
      var pos = w.scrollLeft;

      function autoScroll() {
        if (stopped) return;
        var max = w.scrollWidth - w.clientWidth;
        pos += speed * direction;
        if (pos >= max) { pos = max; direction = -1; }
        if (pos <= 0) { pos = 0; direction = 1; }
        w.scrollLeft = pos;
        rafId = requestAnimationFrame(autoScroll);
      }
      rafId = requestAnimationFrame(autoScroll);

      function stopForever() {
        if (stopped) return;
        stopped = true;
        cancelAnimationFrame(rafId);
      }

      var touchStartX, touchStartY;
      w.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].pageX;
        touchStartY = e.touches[0].pageY;
      });
      w.addEventListener('touchmove', function(e) {
        if (stopped) return;
        var dx = Math.abs(e.touches[0].pageX - touchStartX);
        var dy = Math.abs(e.touches[0].pageY - touchStartY);
        if (dx > dy && dx > 10) stopForever();
      });

      var startX, scrollStart, isDragging = false;
      w.addEventListener('mousedown', function(e) {
        stopForever();
        isDragging = true;
        startX = e.pageX;
        scrollStart = w.scrollLeft;
        w.classList.add('dragging');
        e.preventDefault();
      });
      document.addEventListener('mousemove', function(e) {
        if (!isDragging) return;
        w.scrollLeft = scrollStart - (e.pageX - startX);
      });
      document.addEventListener('mouseup', function() {
        if (!isDragging) return;
        isDragging = false;
        w.classList.remove('dragging');
      });
    })();
  </script>
