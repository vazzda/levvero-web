<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levvero</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: #F8F9FA;
      color: #373D43;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
      max-width: 600px;
      flex: 1;
      justify-content: center;
    }

    .icon {
      width: 120px;
      height: 120px;
      border-radius: 24px;
      margin-bottom: 32px;
    }

    .title {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 16px;
    }

    .title .v1 { color: #FFB703; }
    .title .v2 { color: #219EBC; }

    .tagline {
      font-size: 18px;
      font-weight: 400;
      text-align: center;
      color: #6C757D;
      line-height: 1.6;
      margin-bottom: 48px;
    }

    .stores {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 28px;
      border-radius: 12px;
      background: #373D43;
      color: #F8F9FA;
      text-decoration: none;
      font-family: 'Montserrat', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .store-btn:hover { opacity: 0.85; }

    .store-btn svg {
      width: 22px;
      height: 22px;
      fill: #F8F9FA;
    }

    footer {
      padding: 24px;
      text-align: center;
    }

    footer a {
      color: #6C757D;
      font-size: 14px;
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    @media (max-width: 480px) {
      .title { font-size: 36px; }
      .tagline { font-size: 16px; }
      .icon { width: 96px; height: 96px; border-radius: 20px; }
    }
  </style>
</head>
<body>
  <main>
    <img class="icon" src="icon.png" alt="Levvero">
    <h1 class="title">Le<span class="v1">v</span><span class="v2">v</span>ero</h1>
    <p class="tagline">Track Wins. Cut Vices. Monitor Signals.<br>Stay on course.</p>
    <div class="stores">
      <a class="store-btn" href="#">
        <svg viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        App Store
      </a>
      <a class="store-btn" href="#">
        <svg viewBox="0 0 24 24"><path d="M3.61 1.814L13.793 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .61-.92zm.96-.764L15.9 7.39l-2.96 2.96L5.18 2.59l-.61-.54zm11.71 6.68L18.6 9.17c.39.22.63.63.63 1.08s-.24.86-.63 1.08l-2.69 1.52-3.14-3.14 3.14-3.14zM4.57 21.41l.61-.54 7.76-7.76 2.96 2.96L4.57 21.41z"/></svg>
        Google Play
      </a>
    </div>
  </main>
  <footer>
    <a href="privacy.html">Privacy Policy</a> · <a href="support.html">Support</a>
  </footer>
</body>
</html>
